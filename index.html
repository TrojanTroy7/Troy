<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troy | طروادة</title>
    <style>
        body {
            background-color: #1C1C1C;
            color: #808080;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { font-weight: 300; margin-top: 20px; opacity: 0.8; letter-spacing: 3px; }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            width: 85%;
            margin-top: 50px;
            padding: 20px;
        }
        .item-box {
            aspect-ratio: 1 / 1;
            border: 1px solid #414141;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .item-box:hover { 
            border-color: #808080; 
            background: #252525;
            color: #FFFFFF;
        }
        #selection-bin {
            margin-top: 40px;
            padding: 15px;
            border-top: 1px solid #414141;
            width: 80%;
            text-align: center;
        }
        .start-btn {
            background: none;
            border: 1px solid #808080;
            color: #808080;
            padding: 12px 40px;
            cursor: pointer;
            margin-top: 30px;
            letter-spacing: 5px;
            transition: 0.4s;
        }
        .start-btn:hover { 
            background: #808080; 
            color: #1C1C1C; 
            box-shadow: 0 0 15px rgba(128, 128, 128, 0.4);
        }
    </style>
</head>
<body>
    <h1>TROY / طروادة</h1>
    <div class="inventory-grid" id="main-inventory"></div>
    <div id="selection-bin">
        <p style="font-size: 0.7rem; opacity: 0.4; letter-spacing: 2px;">SELECTED OBJECTS WILL BE ARCHIVED HERE</p>
    </div>
    <button class="start-btn">INITIALIZE SIMULATION</button>
    <script src="bridge.js"></script>
</body>
</html>
