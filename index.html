<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troy</title>
    <style>
        body {
            background-color: #1C1C1C;
            color: #414141;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 1.1rem;
            opacity: 0.7;
            margin: 0;
            direction: ltr; 
            unicode-bidi: isolate;
        }
        .soon {
            font-size: 0.8rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0.4;
        }
        .date-mark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.6rem;
            opacity: 0.3;
            letter-spacing: 1px;
        }
        .go-btn {
            background: none;
            border: 1px solid #414141;
            color: #414141;
            padding: 8px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            margin-top: 20px;
            transition: 0.3s;
        }
        .go-btn:hover {
            opacity: 1;
            color: #808080;
            border-color: #808080;
        }
        #engine-interface {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            width: 80%;
            margin-top: 30px;
        }
        .item-box {
            aspect-ratio: 1/1;
            border: 1px solid #414141;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .start-btn {
            background: none;
            border: 1px solid #414141;
            color: #414141;
            padding: 10px 30px;
            cursor: pointer;
            margin-top: 40px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div id="welcome-screen" class="container">
        <h1>Welcome to Troy / طروادة </h1>
        <div class="soon">Soon...</div>
        <button class="go-btn" onclick="startEngine()">Go, Engine.</button>
    </div>

    <div id="engine-interface">
        <h1>TROY / طروادة</h1>
        <div class="inventory-grid" id="main-inventory"></div>
        <button class="start-btn">INITIALIZE SIMULATION</button>
    </div>

    <div class="date-mark">Since April 28, 2026</div>

    <script>
        function startEngine() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('engine-interface').style.display = 'flex';
        }
    </script>
    <script src="bridge.js"></script>
</body>
</html>
